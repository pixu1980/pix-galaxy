name: A11y Audit

on:
  pull_request:
  workflow_dispatch:

jobs:
  a11y:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run accessibility pipeline
        run: pnpm run a11y:ci

      - name: Upload standalone HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: a11y-html-report
          path: reports/a11y/axe-report.html

      - name: Upload full a11y reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: a11y-reports
          path: reports/a11y

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/a11y/axe.sarif
