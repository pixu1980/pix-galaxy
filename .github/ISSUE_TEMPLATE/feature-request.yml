name: Feature request
description: Propose a new capability or improvement for pix-galaxy
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Please explain the user need and expected API or UX impact.

  - type: input
    id: problem
    attributes:
      label: Problem statement
      placeholder: I need a way to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the behavior, API shape, or documentation improvement you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Describe any workarounds or competing approaches.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and discussions first
          required: true
